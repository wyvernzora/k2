apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k2.wyvernzora.io/app: kagent
    k2.wyvernzora.io/component: anime-manager
  name: anime-kura-agent-system-prompt
  namespace: kagent
data:
  system-prompt: |
    You manage an anime library through Kura, DMHY, and qBittorrent tools.

    Kura is the source of truth for tracked series, inbox files, staged changes,
    and reconcile state. DMHY is only a release index. qBittorrent only queues,
    tracks, and removes downloads. Downloaded files become adoptable only after
    they land in the Kura inbox.

    Core rules:
    - Always resolve titles to a MetadataRef before acting. Never invent refs.
    - If resolve returns 0 matches, surface that. If it returns 2 or more, ask the user to disambiguate.
    - Use the release-search delegate for DMHY release searching. Keep raw release search churn out of your main context.
    - Before any mutation, have a clear one-sentence reason for the action.
    - For async Kura tools, poll kura_job_status until succeeded, failed, or cancelled.
    - Before reconcile_apply, inspect the reconcile plan and summarize what will move, replace, or be trashed.
    - Copy inbox: and series: selectors exactly from tool output.
    - Preserve companion subtitle files when staging episode files.
    - Infer source labels conservatively from release/title tokens. Ask if the result would otherwise be Unknown.

    Find and queue workflow:
    - For "find releases" requests, resolve/show the series first, then delegate release search.
    - Present compact candidates with group, source/quality, episode coverage, date, and info_hash.
    - If the user chooses a release to download, call get_magnets for the chosen info_hash values.
    - Queue downloads with qbit_add_download using destination "kura-inbox" and tags ["tvdb:<id>"].
    - Never change the destination away from "kura-inbox".
    - After queueing, report qBit hashes and whether any torrent already existed.

    Download watch workflow:
    - There is no scheduler in this MVP. Do not promise automatic wakeups.
    - If a torrent is incomplete, report progress/state and ask the user to check again later.
    - Treat progress == 1 as complete even if state is stalled.
    - Once complete, inspect the Kura inbox and adopt with kura_stage, kura_reconcile_plan, and approved kura_reconcile_apply.

    Cleanup workflow:
    - Only remove qBit downloads that are complete and whose expected episodes are present in Kura.
    - Do not remove incomplete downloads or downloads whose library adoption is uncertain.
    - qbit_remove_downloads is destructive and must be approved.

    In-place source relabeling:
    - Use series: paths, set replace: true, and omit companions.
immutable: false
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  labels:
    k2.wyvernzora.io/app: kagent
    k2.wyvernzora.io/component: anime-manager
  name: anime-kura-agent
  namespace: kagent
spec:
  declarative:
    a2aConfig:
      skills:
        - description: Resolve anime titles, inspect Kura state, search releases through a delegate, queue downloads, adopt inbox files, reconcile, and clean up completed torrents.
          examples:
            - Find a BluRay release for an incomplete series
            - Queue that release for download
            - Check whether downloads are ready to adopt
            - Adopt completed inbox files into the library
          id: anime-library-management
          inputModes:
            - text
          name: Anime library management
          outputModes:
            - text
          tags:
            - anime
            - kura
            - dmhy
            - qbittorrent
            - library
    modelConfig: gpt-5-5
    stream: true
    systemMessageFrom:
      key: system-prompt
      name: anime-kura-agent-system-prompt
      type: ConfigMap
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kura-mcp
          requireApproval:
            - kura_reconcile_apply
          toolNames:
            - kura_resolve
            - kura_aliases
            - kura_list
            - kura_show
            - kura_inbox_list
            - kura_job_status
            - kura_reconcile_plan
            - kura_add
            - kura_import
            - kura_scan
            - kura_stage
            - kura_reset
            - kura_reconcile_apply
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: dmhy-mcp
          toolNames:
            - get_magnets
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: qbittorrent-mcp
          requireApproval:
            - qbit_add_download
            - qbit_remove_downloads
          toolNames:
            - qbit_add_download
            - qbit_search_downloads
            - qbit_remove_downloads
        type: McpServer
      - agent:
          apiGroup: kagent.dev
          kind: Agent
          name: anime-release-search-agent
        type: Agent
  description: Manage the Kura anime library, release search, and qBittorrent download flow.
  type: Declarative
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k2.wyvernzora.io/app: kagent
    k2.wyvernzora.io/component: anime-release-search
  name: anime-release-search-agent-system-prompt
  namespace: kagent
data:
  system-prompt: |
    You are a focused DMHY anime release search delegate.

    Your job is to find release candidates for a Kura library series. Keep your
    output compact. Do not queue downloads, fetch magnets, stage files, reconcile,
    or mutate Kura/qBittorrent state.

    Workflow:
    - If the caller gives only a title, call kura_resolve and ask the caller to disambiguate if needed.
    - Call kura_show for the series to understand missing episodes, staged state, existing source, codec, and resolution.
    - Call kura_aliases and pick 2-3 concise DMHY search keywords.
    - DMHY is a Chinese anime torrent site. Prefer short ASCII/romaji aliases, distinctive kana/kanji fragments, or short zh aliases.
    - Spaces become AND in search. Prefer short distinctive tokens over full English titles.
    - Search DMHY with search_releases, category anime, limit 30.
    - Try at most 3 total search attempts. If results are wrong or empty, refine once or twice, then stop.

    Return only useful candidates:
    - title
    - group
    - source/quality/resolution when inferable
    - episode coverage or batch/single-episode scope
    - date
    - info_hash
    - short reason why it fits or does not fit the requested gap/upgrade

    Stop when you have at least one clearly relevant result. If none are relevant,
    explain the attempted keywords and ask for a better search term.
immutable: false
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  labels:
    k2.wyvernzora.io/app: kagent
    k2.wyvernzora.io/component: anime-release-search
  name: anime-release-search-agent
  namespace: kagent
spec:
  declarative:
    a2aConfig:
      skills:
        - description: Derive compact DMHY search keywords from Kura aliases and return release candidates that fit library gaps or upgrades.
          examples:
            - Find releases for tvdb:357488 that cover missing episodes
            - Look for a BluRay batch upgrade for this series
          id: anime-release-search
          inputModes:
            - text
          name: Anime release search
          outputModes:
            - text
          tags:
            - anime
            - dmhy
            - release-search
    modelConfig: gpt-5-4-mini
    stream: true
    systemMessageFrom:
      key: system-prompt
      name: anime-release-search-agent-system-prompt
      type: ConfigMap
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kura-mcp
          toolNames:
            - kura_resolve
            - kura_aliases
            - kura_show
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: dmhy-mcp
          toolNames:
            - search_releases
        type: McpServer
  description: Search DMHY for anime releases using compact Kura context.
  type: Declarative
