apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: pocket-id
    k2.wyvernzora.io/component: pocket-id
  name: pocket-id
  namespace: pocket-id
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: pocket-id
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: pocket-id
        cdk8s.io/metadata.addr: pocket-id-deployment-c85db61f
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - env:
            - name: APP_URL
              value: https://id.k2.wyvernzora.io
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "1411"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TRUST_PROXY
              value: "true"
            - name: FILE_BACKEND
              value: database
            - name: ANALYTICS_DISABLED
              value: "true"
            - name: VERSION_CHECK_DISABLED
              value: "true"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  key: encryptionKey
                  name: pocket-id
            - name: STATIC_API_KEY
              valueFrom:
                secretKeyRef:
                  key: apiKey
                  name: pocket-id-bootstrap-api-key
                  optional: true
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  key: host
                  name: pocket-id-credentials
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  key: port
                  name: pocket-id-credentials
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  key: dbname
                  name: pocket-id-credentials
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: pocket-id-credentials
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: pocket-id-credentials
            - name: DB_CONNECTION_STRING
              value: postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable
          image: ghcr.io/pocket-id/pocket-id:v2.7.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 5
          name: pocket-id
          ports:
            - containerPort: 1411
              name: http
          readinessProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
                - SETGID
                - SETUID
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /app/data
              name: data
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: Always
        runAsNonRoot: false
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir:
            sizeLimit: 256Mi
          name: data
