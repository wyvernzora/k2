                                  type: object
                                type: array
                            type: object
                          type: array
                      type: object
                    type: array
                  labels:
                    description: |-
                      Labels is a list of optional strings which can be used to
                      re-identify the rule or to store metadata. It is possible to lookup
                      or delete strings based on labels. Labels are not required to be
                      unique, multiple rules can have overlapping or identical labels.
                    items:
                      description: Label is the Cilium's representation of a container label.
                      properties:
                        key:
                          type: string
                        source:
                          description: 'Source can be one of the above values (e.g.: LabelSourceContainer).'
                          type: string
                        value:
                          type: string
                      required:
                        - key
                      type: object
                    type: array
                  log:
                    description: Log specifies custom policy-specific Hubble logging configuration.
                    properties:
                      value:
                        description: |-
                          Value is a free-form string that is included in Hubble flows
                          that match this policy. The string is limited to 32 printable characters.
                        maxLength: 32
                        pattern: ^\PC*$
                        type: string
                    type: object
                  nodeSelector:
                    description: |-
                      NodeSelector selects all nodes which should be subject to this rule.
                      EndpointSelector and NodeSelector cannot be both empty and are mutually
                      exclusive. Can only be used in CiliumClusterwideNetworkPolicies.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              enum:
                                - In
                                - NotIn
                                - Exists
                                - DoesNotExist
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
