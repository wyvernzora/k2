apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    ingress.pomerium.io/policy: |
      - allow:
          and:
            - authenticated_user: true
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: qbittorrent
  name: flood-ingress
  namespace: qbittorrent
spec:
  ingressClassName: pomerium
  rules:
    - host: dl.wyvernzora.io
      http:
        paths:
          - backend:
              service:
                name: flood
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - dl.wyvernzora.io
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    ingress.pomerium.io/mcp_server: "true"
    ingress.pomerium.io/mcp_server_path: /mcp
    ingress.pomerium.io/policy: |
      - allow:
          and:
            - authenticated_user: true
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: qbittorrent
  name: mcp-ingress
  namespace: qbittorrent
spec:
  ingressClassName: pomerium
  rules:
    - host: dl.wyvernzora.io
      http:
        paths:
          - backend:
              service:
                name: qbit-bridge
                port:
                  name: http
            path: /mcp
            pathType: Prefix
  tls:
    - hosts:
        - dl.wyvernzora.io
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: network-policy
  name: namespace-boundary
  namespace: qbittorrent
spec:
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: qbittorrent
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: qbittorrent
    - fromEntities:
        - kube-apiserver
---
