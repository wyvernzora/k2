targets:
  ubuntu-26.04-amd64-qemu-k8s:
    enabled: true
    flavor: ubuntu-26.04
    role: k8s
    arch: amd64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    overlays:
      - base
      - hardware/qemu
      - role/k8s
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 8192

  ubuntu-26.04-arm64-qemu-k8s:
    enabled: true
    flavor: ubuntu-26.04
    role: k8s
    arch: arm64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    # Measured 1377.9 on 2026-07-09 (post slice-1 purge; growth vs Jul 8
    # baseline is apt drift in the mutable base + the D28 agent). Slice 2
    # (virtual kernel) should drop this by ~200; re-tighten then.
    maxRawXzMB: 1380
    overlays:
      - base
      - hardware/qemu
      - role/k8s
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 8192

  ubuntu-26.04-arm64-rpi4cb-k8s:
    enabled: true
    flavor: ubuntu-26.04
    role: k8s
    arch: arm64
    hardware: rpi4cb
    kairosModel: rpi4
    artifacts:
      - raw
    overlays:
      - base
      - hardware/rpi4cb
      - role/k8s
    artifactOptions:
      raw:
        diskStateSize: 8192

  # Storage appliance targets: role "storage" yields a Kairos core image
  # (no Kubernetes). ZFS + LIO iSCSI target host managed by democratic-csi
  # over SSH.
  ubuntu-26.04-amd64-qemu-storage:
    enabled: true
    flavor: ubuntu-26.04
    role: storage
    arch: amd64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    overlays:
      - base
      - hardware/qemu
      - role/storage
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 6144

  ubuntu-26.04-arm64-qemu-storage:
    enabled: true
    flavor: ubuntu-26.04
    role: storage
    arch: arm64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    # Measured 1273.3 on 2026-07-09 (post slice-1 purge).
    maxRawXzMB: 1280
    overlays:
      - base
      - hardware/qemu
      - role/storage
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 6144
