    app.kubernetes.io/version: 1.8.0
    helm.sh/chart: k8s-gateway-3.7.1
    k2.wyvernzora.io/app: blocky
    k2.wyvernzora.io/component: k8s-gateway
  name: k8s-gateway
  namespace: blocky
