                                          request, e.g. "produce", "fetch", "createtopic", "deletetopic", et al
                                          Reference: https://kafka.apache.org/protocol#protocol_api_keys

                                          If omitted or empty, and if Role is not specified, then all keys are allowed.
                                        type: string
                                      apiVersion:
                                        description: |-
