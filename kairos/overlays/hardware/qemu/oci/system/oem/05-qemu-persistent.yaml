#cloud-config
name: "QEMU required second-disk COS_PERSISTENT"

stages:
  rootfs.before:
    - name: "Prepare QEMU COS_PERSISTENT"
      if: '[ ! -f "/run/cos/recovery_mode" ]'
      commands:
        - /usr/local/bin/k2-node-init storage --mode required --disk auto --log-prefix kairos-qemu-persistent --marker .qemu-persistent-ok

  fs:
    - name: "Record QEMU persistent layout"
      if: '[ ! -f "/run/cos/recovery_mode" ]'
      commands:
        - /usr/local/bin/k2-node-init storage --verify-only --mode required --log-prefix kairos-qemu-persistent --marker .qemu-persistent-ok
