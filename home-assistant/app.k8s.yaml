apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: home-assistant
    k2.wyvernzora.io/component: mosquitto
  name: mosquitto
  namespace: home-assistant
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: mosquitto
      app.kubernetes.io/name: home-assistant
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/mosquitto-config: d7c7c5a6a7e01717d9abcd1a4ee15dd3437e7a62b39ad6a748a246d61bdc9742
      labels:
        app.kubernetes.io/component: mosquitto
        app.kubernetes.io/name: home-assistant
        cdk8s.io/metadata.addr: mosquitto-deployment-c84756bb
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - image: eclipse-mosquitto:2.0.22
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - mosquitto_sub
                - -t
                - $$SYS/#
                - -C
                - "1"
                - -W
                - "5"
            failureThreshold: 3
          name: mosquitto
          ports:
            - containerPort: 1883
              name: mqtt
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - mosquitto_sub
                - -t
                - $$SYS/#
                - -C
                - "1"
                - -W
                - "5"
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 512Mi
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /mosquitto/data
              name: pvc-mosquitto-data
            - mountPath: /mosquitto/log
              name: vol-logs
            - mountPath: /mosquitto/config/mosquitto.conf
              name: configmap-mosquitto-config
              subPath: mosquitto.conf
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: false
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: pvc-mosquitto-data
          persistentVolumeClaim:
            claimName: mosquitto-data
            readOnly: false
        - emptyDir:
            sizeLimit: 1024Mi
          name: vol-logs
        - configMap:
            name: mosquitto-config
          name: configmap-mosquitto-config
---
