#cloud-config
name: "K2 rescue user — deactivate on active boot"

# k2-rescue is baked into both COS_ACTIVE and COS_RECOVERY at image
# build time (see kairos/Dockerfile). On active boot we
# lock the account + remove its sudoers drop-in so it can't be used
# without booting into the recovery rootfs. The DenyUsers directive
# in /etc/ssh/sshd_config.d/99-k2-rescue-block.conf stays in both
# modes — recovery use is intended to be UART-only.
#
# The recovery_mode marker file is created by Kairos's boot-mode
# detection (initramfs sets it when COS_RECOVERY is mounted as
# rootfs); same gate is used by other overlays in this tree.

stages:
  boot:
    - name: "Lock k2-rescue on active boot"
      if: '[ ! -f "/run/cos/recovery_mode" ]'
      commands:
        - passwd -l k2-rescue
        - rm -f /etc/sudoers.d/99-k2-rescue
