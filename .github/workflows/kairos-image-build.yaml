name: Kairos Image Build

env:
  EARTHLY_IMAGE: earthly/earthly:v0.8.13

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "tools/**"
      - "kairos/Dockerfile"
      - "kairos/overlays/**"
      - "kairos/scripts/**"
      - "kairos/node-init/**"
      - "kairos/Earthfile"
      - "kairos/targets.yaml"
      - "kairos/versions.env"
      - ".github/workflows/kairos-image-build.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "tools/**"
      - "kairos/Dockerfile"
      - "kairos/overlays/**"
      - "kairos/scripts/**"
      - "kairos/node-init/**"
      - "kairos/Earthfile"
      - "kairos/targets.yaml"
      - "kairos/versions.env"
      - ".github/workflows/kairos-image-build.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

jobs:
  targets:
    name: Resolve targets
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: |
            tools/go.sum
            kairos/node-init/go.sum

      - name: Test k2-tools image command
        shell: bash
        run: |
          cd tools
          go test ./cmd/k2-tools ./internal/buildtool/... ./internal/toolcli ./internal/kairos/imagebuild/... ./internal/kairos/tools/... ./internal/ui
          go vet ./cmd/k2-tools ./internal/buildtool/... ./internal/toolcli ./internal/kairos/imagebuild/... ./internal/kairos/tools/... ./internal/ui
          go build -o k2-tools ./cmd/k2-tools
          cd ..
          ./tools/k2-tools image plan --all --format json >/tmp/kairos-image-build-plans.json

      - name: Test node-init helper
        shell: bash
        run: |
          cd kairos/node-init
          go test ./...
          go vet ./...

      - name: Detect changed image inputs
        id: changes
        shell: bash
        run: |
          force_all=false
          : >/tmp/kairos-image-build-changed-files.txt

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            force_all=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > /tmp/kairos-image-build-changed-files.txt
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before="${{ github.event.before }}"
            if [[ "$before" =~ ^0+$ ]]; then
              force_all=true
            elif ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
              # Force-push / rebase orphaned the previous tip — can't
              # diff against it. Fall back to a full rebuild rather than
              # silently skipping work.
              echo "Previous commit ${before} not present (force-push?); treating as full rebuild." >&2
              force_all=true
            else
              git diff --name-only "$before" "${{ github.sha }}" > /tmp/kairos-image-build-changed-files.txt
            fi
          fi

          echo "force_all=${force_all}" >> "$GITHUB_OUTPUT"
          echo "Changed image inputs:"
          sed 's/^/  /' /tmp/kairos-image-build-changed-files.txt || true

      - name: Resolve changed targets
        id: targets
        shell: bash
        run: |
          targets=$(kairos/scripts/resolve-ci-targets.sh \
            /tmp/kairos-image-build-plans.json \
            /tmp/kairos-image-build-changed-files.txt \
            "${{ steps.changes.outputs.force_all }}")
          echo "Target matrix:"
          echo "${targets}" | jq .
          echo "targets=${targets}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: targets
    if: needs.targets.outputs.targets != '[]'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.targets.outputs.targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod

      - name: Build k2-tools image command
        shell: bash
        run: |
          cd tools
          go build -o k2-tools ./cmd/k2-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image locally
        shell: bash
        run: ./tools/k2-tools image build oci "${{ matrix.target }}"

      - name: Inspect OCI image
        shell: bash
        run: ./tools/k2-tools image inspect oci "${{ matrix.target }}"

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          mkdir -p "kairos/ci-metadata/${{ matrix.target }}"
          ./tools/k2-tools image plan "${{ matrix.target }}" --format json | tee "kairos/ci-metadata/${{ matrix.target }}/plan.json" >/tmp/kairos-image-plan.json
          echo "tag=$(jq -r '.image' /tmp/kairos-image-plan.json)" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        continue-on-error: true
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH

      - name: Grype scan
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c
        continue-on-error: true
        with:
          image: ${{ steps.image.outputs.tag }}
          fail-build: false
          severity-cutoff: critical

      - name: Validate S3 publishing configuration
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          K2_KAIROS_IMAGE_AWS_REGION: ${{ vars.K2_KAIROS_IMAGE_AWS_REGION }}
          K2_KAIROS_IMAGE_AWS_ROLE_ARN: ${{ vars.K2_KAIROS_IMAGE_AWS_ROLE_ARN }}
          K2_KAIROS_IMAGE_BUCKET: ${{ vars.K2_KAIROS_IMAGE_BUCKET }}
        run: |
          test -n "${K2_KAIROS_IMAGE_AWS_REGION}" || { echo "Missing repository variable K2_KAIROS_IMAGE_AWS_REGION" >&2; exit 1; }
          test -n "${K2_KAIROS_IMAGE_AWS_ROLE_ARN}" || { echo "Missing repository variable K2_KAIROS_IMAGE_AWS_ROLE_ARN" >&2; exit 1; }
          test -n "${K2_KAIROS_IMAGE_BUCKET}" || { echo "Missing repository variable K2_KAIROS_IMAGE_BUCKET" >&2; exit 1; }

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.K2_KAIROS_IMAGE_AWS_ROLE_ARN }}
          aws-region: ${{ vars.K2_KAIROS_IMAGE_AWS_REGION }}

      - name: Build and inspect bootable artifact with Earthly
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          docker run --privileged --rm \
            -v "$PWD":/workspace \
            -v earthly-cache:/tmp/earthly \
            -w /workspace \
            "${EARTHLY_IMAGE}" \
            --allow-privileged \
            ./kairos+image-build-artifact \
            --KAIROS_TARGET="${{ matrix.target }}"

      - name: Push OCI image
        if: github.event_name != 'pull_request'
        shell: bash
        run: ./tools/k2-tools image build oci "${{ matrix.target }}" --push

      - name: Publish bootable artifact to S3
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          K2_KAIROS_IMAGE_BUCKET: ${{ vars.K2_KAIROS_IMAGE_BUCKET }}
          K2_KAIROS_IMAGE_PREFIX: ${{ vars.K2_KAIROS_IMAGE_PREFIX }}
          K2_KAIROS_IMAGE_KEEP: ${{ vars.K2_KAIROS_IMAGE_KEEP }}
          K2_KAIROS_PUBLISH_MANIFEST: kairos/ci-metadata/${{ matrix.target }}/publish-manifest.json
          K2_KAIROS_IMAGE_STORAGE_CLASS: ${{ vars.K2_KAIROS_IMAGE_STORAGE_CLASS }}
        run: |
          kairos/scripts/publish-s3-artifact.sh \
            "${{ matrix.target }}" \
            "kairos/artifacts/${{ matrix.target }}"

      - name: Collect Kairos metadata
        shell: bash
        run: |
          metadata_dir="kairos/ci-metadata/${{ matrix.target }}"
          artifact_dir="kairos/artifacts/${{ matrix.target }}"
          if [[ -d "${artifact_dir}" ]]; then
            cp "${artifact_dir}/artifact-manifest.json" "${metadata_dir}/" 2>/dev/null || true
            cp "${artifact_dir}/SHA256SUMS" "${metadata_dir}/" 2>/dev/null || true
          fi

      - name: Upload Kairos metadata
        uses: actions/upload-artifact@v7
        with:
          name: kairos-metadata-${{ matrix.target }}
          path: kairos/ci-metadata/${{ matrix.target }}/*
          if-no-files-found: error
          retention-days: 14
