targets:
  ubuntu-26.04-amd64-qemu-k8s:
    enabled: true
    flavor: ubuntu-26.04
    role: k8s
    arch: amd64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    overlays:
      - base
      - hardware/qemu
      - role/k8s
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 8192

  ubuntu-26.04-arm64-qemu-k8s:
    enabled: true
    flavor: ubuntu-26.04
    role: k8s
    arch: arm64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    # Measured 690.2 on 2026-07-09 (slice 2: virtual kernel + firmware drop).
    maxRawXzMB: 700
    overlays:
      - base
      - hardware/qemu
      - role/k8s
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 8192

  ubuntu-26.04-arm64-rpi4cb-k8s:
    enabled: true
    flavor: ubuntu-26.04
    role: k8s
    arch: arm64
    hardware: rpi4cb
    kairosModel: rpi4
    artifacts:
      - raw
    overlays:
      - base
      - hardware/rpi4cb
      - role/k8s
    artifactOptions:
      raw:
        diskStateSize: 8192

  # Storage appliance targets: role "storage" yields a Kairos core image
  # (no Kubernetes). ZFS + LIO iSCSI target host managed by democratic-csi
  # over SSH.
  ubuntu-26.04-amd64-qemu-storage:
    enabled: true
    flavor: ubuntu-26.04
    role: storage
    arch: amd64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    overlays:
      - base
      - hardware/qemu
      - role/storage
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 6144

  ubuntu-26.04-arm64-qemu-storage:
    enabled: true
    flavor: ubuntu-26.04
    role: storage
    arch: arm64
    hardware: qemu
    kairosModel: generic
    artifacts:
      - raw
    # Coarse regression guard: measured 619.6 on 2026-07-11. Routine mutable-
    # base drift is irrelevant; catch only major package/image-size regressions.
    maxRawXzMB: 800
    overlays:
      - base
      - hardware/qemu
      - role/storage
    artifactOptions:
      raw:
        diskSize: 16384
        diskStateSize: 6144
