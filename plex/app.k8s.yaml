apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-depl-tls-termination-caddy-conf-c8e37d19
data:
  Caddyfile: |-
    {
      auto_https off
    }

    :80 {
      redir https://{host}{uri} permanent
    }

    :443 {
      tls /etc/caddy/tls/tls.crt /etc/caddy/tls/tls.key

      reverse_proxy 127.0.0.1:32400
    }
  watch-certs.sh: |-
    #!/bin/sh
    set -eu

    checksum() {
      sha256sum /etc/caddy/tls/tls.crt /etc/caddy/tls/tls.key 2>/dev/null || true
    }

    caddy run --config /etc/caddy/Caddyfile --adapter caddyfile &
    pid="$!"
    trap 'kill -TERM "$pid"; wait "$pid"' TERM INT

    last="$(checksum)"
    while kill -0 "$pid" 2>/dev/null; do
      sleep 60
      next="$(checksum)"
      if [ "$next" != "$last" ]; then
        caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile --force
        last="$next"
      fi
    done

    wait "$pid"
immutable: false
---
