apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-remote-mcp-config
  namespace: gen-ai
data:
  .mcp.json: |-
    {
      "mcpServers": {
        "kura": {
          "type": "http",
          "url": "http://kura-mcp.media.svc.cluster.local/mcp"
        },
        "dmhy": {
          "type": "http",
          "url": "http://dmhy-mcp.media.svc.cluster.local/mcp"
        },
        "qbittorrent": {
          "type": "http",
          "url": "http://qbittorrent-mcp.media.svc.cluster.local/mcp"
        }
      }
    }
immutable: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    checksum/config: 4cd9433bf89e1f9ade38df8b319a0563b70bf1e9ab8b6441375a79df19f9738d
  name: claude-remote-depl-c8a68425
  namespace: gen-ai
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      cdk8s.io/metadata.addr: claude-remote-depl-c8a4ca01
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        cdk8s.io/metadata.addr: claude-remote-depl-c8a4ca01
    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: CLAUDE_REMOTE_NAME
              value: K2 Claude Remote
            - name: CLAUDE_REMOTE_CREATE_SESSION_IN_DIR
              value: "false"
          image: ghcr.io/wyvernzora/claude-remote:2.1.140
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - claude-health
            failureThreshold: 3
          name: claude-remote
          resources:
            limits:
              cpu: 2000m
              memory: 2048Mi
            requests:
              cpu: 100m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          volumeMounts:
            - mountPath: /home/claude
              name: pvc-claude-remote-depl-vol-state-pvc-c8333c0b
            - mountPath: /workspace
              name: pvc-claude-remote-depl-vol-workspace-pvc-c8ed2862
            - mountPath: /var/run/config/claude
              name: configmap-claude-remote-mcp-config
              readOnly: true
      dnsPolicy: ClusterFirst
      hostNetwork: false
      hostname: k2-claude-remote
      restartPolicy: Always
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: pvc-claude-remote-depl-vol-state-pvc-c8333c0b
          persistentVolumeClaim:
            claimName: claude-remote-depl-vol-state-pvc-c8333c0b
            readOnly: false
        - name: pvc-claude-remote-depl-vol-workspace-pvc-c8ed2862
          persistentVolumeClaim:
            claimName: claude-remote-depl-vol-workspace-pvc-c8ed2862
            readOnly: false
        - configMap:
            name: claude-remote-mcp-config
          name: configmap-claude-remote-mcp-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-remote-depl-vol-state-pvc-c8333c0b
  namespace: gen-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: longhorn
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-remote-depl-vol-workspace-pvc-c8ed2862
  namespace: gen-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  volumeMode: Filesystem
