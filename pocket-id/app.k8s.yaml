apiVersion: batch/v1
kind: Job
metadata:
  labels:
    k2.wyvernzora.io/app: pocket-id
    k2.wyvernzora.io/component: pocket-id
  name: setup
  namespace: pocket-id
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: setup
        app.kubernetes.io/name: pocket-id
        cdk8s.io/metadata.addr: pocket-id-setup-job-c8b3a638
        k2.wyvernzora.io/scripted-workload-type: job
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: true
      containers:
        - command:
            - sh
            - -c
            - |-
              workload='job/setup'
              script='setup.py'
              log() { printf '%s %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$1"; }
              trap 'log "$workload interrupted by SIGTERM while running $script"; exit 143' TERM
              trap 'log "$workload interrupted by SIGINT while running $script"; exit 130' INT
              log "$workload started $script"
              "$@"
              status=$?
              if [ "$status" -eq 0 ]; then
                log "$workload finished $script successfully"
              else
                log "$workload finished $script with exit code $status"
              fi
              exit "$status"
            - scripted-workload
            - /scripts/setup.py
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POCKET_ID_INTERNAL_URL
              value: http://pocket-id
            - name: POCKET_ID_DEPLOYMENT
              value: pocket-id
            - name: POCKET_ID_BOOTSTRAP_SECRET
              value: pocket-id-bootstrap-api-key
            - name: POMERIUM_NAMESPACE
              value: pomerium
            - name: POMERIUM_SECRET
              value: pocket-id
            - name: POMERIUM_CLIENT_ID
              value: pomerium
            - name: POMERIUM_CALLBACK_URL
              value: https://login.k2.wyvernzora.io/oauth2/callback
            - name: POMERIUM_LAUNCH_URL
              value: https://login.k2.wyvernzora.io
            - name: FORGEJO_NAMESPACE
              value: forgejo
            - name: FORGEJO_SECRET
              value: forgejo-oidc
            - name: FORGEJO_CLIENT_ID
              value: forgejo
            - name: FORGEJO_CALLBACK_URL
              value: https://git.wyvernzora.io/user/oauth2/PocketID/callback
            - name: FORGEJO_LAUNCH_URL
              value: https://git.wyvernzora.io
          image: ghcr.io/wyvernzora/k2-job-runner:v2
          imagePullPolicy: IfNotPresent
          name: script
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /scripts
              name: script
              readOnly: true
            - mountPath: /tmp
              name: tmp
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      restartPolicy: OnFailure
      securityContext:
        fsGroupChangePolicy: Always
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      serviceAccountName: setup
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 365
            name: setup-script
          name: script
        - emptyDir:
            sizeLimit: 16Mi
          name: tmp
  ttlSecondsAfterFinished: 86400
