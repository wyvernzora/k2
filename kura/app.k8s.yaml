apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    k2.wyvernzora.io/app: kura
    k2.wyvernzora.io/component: kura
  name: kura-tvdb
  namespace: kura
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: q4xf32di7npmvc7e62amvgd574/credential
        metadataPolicy: None
        nullBytePolicy: Ignore
      secretKey: credential
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: kura-tvdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: kura
    k2.wyvernzora.io/component: kura
  name: kura
  namespace: kura
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: library-manager
      app.kubernetes.io/name: kura
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: library-manager
        app.kubernetes.io/name: kura
        cdk8s.io/metadata.addr: kura-deployment-c819f6eb
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - roxy
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - args:
            - serve
            - --rest=:8080
            - --mcp-http=:8081
          env:
            - name: KURA_LIBRARY_ROOT
              value: /anime/series
            - name: KURA_INBOX_ROOT
              value: /anime/downloads
            - name: KURA_DISABLE_TOKEN
              value: "1"
            - name: KURA_HOST_ID
              value: k2-kura
            - name: KURA_PREFERRED_LANGUAGES
              value: ja
            - name: KURA_UMASK
              value: "0007"
            - name: KURA_TVDB_KEY
              valueFrom:
                secretKeyRef:
                  key: credential
                  name: kura-tvdb
            - name: TZ
              value: America/Los_Angeles
          image: ghcr.io/wyvernzora/kura:v0.1.0
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: 8080
              scheme: HTTP
          name: kura
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8081
              name: mcp
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: 8080
              scheme: HTTP
          resources:
            limits:
              cpu: 2000m
              ephemeral-storage: 2Gi
              memory: 2048Mi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 2001
            runAsNonRoot: true
            runAsUser: 3000
          volumeMounts:
            - mountPath: /anime
              name: vol-anime
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      initContainers:
        - command:
            - sh
            - -c
            - set -eu; umask 0007; mkdir -p /anime/series /anime/downloads
          image: busybox:1.37.0
          imagePullPolicy: Always
          name: init-library
          resources:
            limits:
              cpu: 1500m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 2001
            runAsNonRoot: true
            runAsUser: 3000
          volumeMounts:
            - mountPath: /anime
              name: vol-anime
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: true
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: vol-anime
          nfs:
            path: /mnt/data/media/anime
            server: 10.10.8.1
---
apiVersion: v1
