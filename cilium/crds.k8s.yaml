                          type 8 ICMP connections.
                        items:
                          description: ICMPRule is a list of ICMP fields.
                          properties:
                            fields:
                              description: Fields is a list of ICMP fields.
                              items:
                                description: ICMPField is a ICMP field.
                                properties:
                                  family:
                                    default: IPv4
                                    description: |-
                                      Family is a IP address version.
