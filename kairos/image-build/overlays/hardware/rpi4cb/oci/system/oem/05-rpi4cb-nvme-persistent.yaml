#cloud-config
name: "RPi CM4 ComputeBlade NVMe COS_PERSISTENT"

stages:
  rootfs.before:
    - name: "Prepare NVMe-backed COS_PERSISTENT"
      if: '[ ! -f "/run/cos/recovery_mode" ]'
      commands:
        - /usr/local/bin/k2-node-init storage --mode required --disk /dev/nvme0n1 --wait-seconds 90 --log-prefix kairos-nvme-persistent --marker .nvme-persistent-ok

  fs:
    - name: "Verify /usr/local is on NVMe"
      if: '[ ! -f "/run/cos/recovery_mode" ]'
      commands:
        - /usr/local/bin/k2-node-init storage --verify-only --mode required --verify-prefix /dev/nvme --log-prefix kairos-nvme-persistent --marker .nvme-persistent-ok
