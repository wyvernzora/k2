commit-msg:
  commands:
    block-claude:
      run: bash scripts/block-claude-commit-msg.sh {1}

pre-commit:
  parallel: false
  commands:
    go-lint:
      run: |
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "golangci-lint not found. Install the CI-pinned version with:" >&2
          echo "  go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2" >&2
          exit 127
        fi
        (cd tools && golangci-lint run --config=../.golangci.yml ./...)
        (cd kairos/node-agent && golangci-lint run --config=../../.golangci.yml ./...)
