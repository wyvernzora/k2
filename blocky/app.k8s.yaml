apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: k8s-gateway
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: k8s-gateway
    app.kubernetes.io/version: 1.8.0
    helm.sh/chart: k8s-gateway-3.7.1
    k2.wyvernzora.io/app: blocky
    k2.wyvernzora.io/component: k8s-gateway
  name: k8s-gateway
  namespace: blocky
data:
  Corefile: |-
    .:1053 {
        k8s_gateway wyvernzora.io {
          apex k8s-gateway.blocky
          ttl 60
          resources Ingress Service HTTPRoute
          fallthrough
        }
        log
        errors
        hosts { 
          ttl 60
          10.10.1.1 unifi.wyvernzora.io
          10.10.7.1 roxy.wyvernzora.io
          10.10.7.2 eris.wyvernzora.io
          10.10.7.3 sylphy.wyvernzora.io
          10.10.7.254 pve.wyvernzora.io
          10.10.8.1 rumi.wyvernzora.io
          10.10.13.1 login.wyvernzora.io
          10.10.9.1 k8s.wyvernzora.io
          fallthrough
        }
        health { 
          lameduck 5s
        }
        ready
        prometheus 0.0.0.0:9153
        forward . 1.1.1.1 9.9.9.9
        cache 30
        loop
        reload
        loadbalance
      }
---
