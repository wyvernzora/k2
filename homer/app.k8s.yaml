apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k2.wyvernzora.io/app: homer
    k2.wyvernzora.io/component: homer
  name: homer-config
  namespace: homer
data:
  config.yml: |
    title: K2
    subtitle: Homelab
    documentTitle: K2 Home
    logo: https://raw.githubusercontent.com/wyvernzora/k2/main/.github/assets/k2.png
    header: true
    footer: false
    columns: auto
    connectivityCheck: true
    services:
      - name: Cluster
        items:
          - name: Argo CD
            subtitle: GitOps control plane
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/argo-cd.svg
            url: https://argo.wyvernzora.io
          - name: Hubble
            subtitle: Cilium observability
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/cilium.svg
            url: https://hubble.wyvernzora.io
          - name: Longhorn
            subtitle: Storage dashboard
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/rancher-longhorn-dark.svg
            url: https://longhorn.wyvernzora.io
      - name: Identity
        items:
          - name: Pocket ID
            subtitle: OIDC identity provider
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/pocket-id.svg
            url: https://id.wyvernzora.io
          - name: Pomerium Login
            subtitle: Authentication portal
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/pomerium.svg
            url: https://login.wyvernzora.io
      - name: Media
        items:
          - name: Kura
            subtitle: Anime library manager
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/kura.svg
            url: https://kura.wyvernzora.io
      - name: Infrastructure
        items:
          - name: Proxmox VE VIP
            subtitle: Virtualization cluster
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/proxmox.svg
            url: https://pve.wyvernzora.io
          - name: TrueNAS Scale
            subtitle: Storage appliance
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/truenas-scale.svg
            url: https://rumi.wyvernzora.io
          - name: UniFi Console
            subtitle: Network controller
            logo: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/ubiquiti-unifi.svg
            url: https://unifi.ui.com
immutable: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: homer
    k2.wyvernzora.io/component: homer
  name: homer
  namespace: homer
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
      app.kubernetes.io/name: homer
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/homer-config: 5a5b3dc1b55493e6b666f71b8f1524a3d294eb4b93ef39b46eae61ec11c62055
      labels:
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/name: homer
        cdk8s.io/metadata.addr: homer-deployment-c8c5f043
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - env:
            - name: INIT_ASSETS
              value: "0"
            - name: PORT
              value: "8080"
          image: b4bz/homer:v26.4.2
          imagePullPolicy: IfNotPresent
          name: homer
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          volumeMounts:
            - mountPath: /www/assets/config.yml
              name: config
              subPath: config.yml
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: true
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            name: homer-config
          name: config
---
apiVersion: v1
kind: Service
metadata:
  labels:
    k2.wyvernzora.io/app: homer
    k2.wyvernzora.io/component: homer
  name: homer
  namespace: homer
spec:
  externalIPs: []
  ports:
    - name: http
      port: 80
      targetPort: 8080
  selector:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/name: homer
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    ingress.pomerium.io/policy: |
      - allow:
          and:
            - authenticated_user: true
  labels:
    k2.wyvernzora.io/app: homer
    k2.wyvernzora.io/component: homer
  name: ingress
  namespace: homer
spec:
  ingressClassName: pomerium
  rules:
    - host: home.wyvernzora.io
      http:
        paths:
          - backend:
              service:
                name: homer
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - home.wyvernzora.io
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: homer
    k2.wyvernzora.io/component: network-policy
  name: namespace-boundary
  namespace: homer
spec:
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homer
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homer
    - fromEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: homer
    k2.wyvernzora.io/component: network-policy
  name: pomerium-homer-pomerium-to-homer
specs:
  - description: pomerium to homer
    egress:
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/component: dashboard
              app.kubernetes.io/name: homer
              k8s:io.kubernetes.pod.namespace: homer
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
    endpointSelector:
      matchLabels:
        app.kubernetes.io/component: proxy
        app.kubernetes.io/name: pomerium
        k8s:io.kubernetes.pod.namespace: pomerium
  - description: pomerium to homer
    endpointSelector:
      matchLabels:
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/name: homer
        k8s:io.kubernetes.pod.namespace: homer
    ingress:
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/component: proxy
              app.kubernetes.io/name: pomerium
              k8s:io.kubernetes.pod.namespace: pomerium
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
