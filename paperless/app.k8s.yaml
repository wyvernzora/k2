                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - paperless.wyvernzora.io
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    ingress.pomerium.io/mcp_server: "true"
    ingress.pomerium.io/mcp_server_path: /mcp
    ingress.pomerium.io/policy: |
      - deny:
          or:
            - mcp_tool:
                in:
                  - delete_tag
                  - bulk_edit_tags
                  - delete_correspondent
                  - bulk_edit_correspondents
                  - delete_document_type
                  - bulk_edit_document_types
                  - delete_custom_field
                  - bulk_edit_custom_fields
      - allow:
          and:
            - authenticated_user: true
  labels:
    k2.wyvernzora.io/app: paperless
    k2.wyvernzora.io/component: paperless
  name: mcp-ingress
  namespace: paperless
spec:
  ingressClassName: pomerium
  rules:
    - host: paperless.wyvernzora.io
      http:
        paths:
          - backend:
              service:
                name: paperless-mcp
                port:
                  name: mcp
            path: /mcp
            pathType: Prefix
  tls:
    - hosts:
        - paperless.wyvernzora.io
