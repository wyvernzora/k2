name: 🏗️ Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - renovate/*
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 0" # every Sunday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Build Kubernetes deployment manifests
  manifests:
    name: 📜 Build k8s deployment manifests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v6

      - name: 🌍 Setup earthly
        uses: earthly/actions-setup@v1
        with:
          version: v0.8.14

      - name: ⚙️ Run manifest build & diff
        run: |
          earthly +lint
          earthly +k8s-manifests
          earthly +diff-manifests

      - name: 🔎 Check deploy diff
        id: deploy-diff
        run: |
          if [ -s deploy-diff.md ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 💬 Post deploy diff status to PR
        if: >
          github.event_name == 'pull_request' &&
          (
            steps.deploy-diff.outputs.has_diff == 'true' ||
            (
              steps.deploy-diff.outputs.has_diff == 'false' &&
              (github.event.pull_request.user.login == 'renovate[bot]' || startsWith(github.event.pull_request.head.ref, 'renovate/'))
            )
          )
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HAS_DIFF: ${{ steps.deploy-diff.outputs.has_diff }}
        run: |
          marker="<!-- Sticky Pull Request Commentdeploy-diff -->"
          generated="$(date -u '+%Y-%m-%d %H:%M:%SZ')"
          short_sha="${GITHUB_SHA::8}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body_file="$(mktemp)"
          payload_file="$(mktemp)"
          if [ "$HAS_DIFF" = "true" ]; then
            {
              echo "## 📝 Changes to the k8s manifests"
              echo
              cat deploy-diff.md
            } > "$body_file"
          else
            echo "## ✅ No manifest changes" > "$body_file"
          fi
          {
            echo
            echo "_Generated on ${generated} for commit \`${short_sha}\`._"
            echo "[View workflow run](${run_url}) · [Artifacts](${run_url}#artifacts)"
            echo
            echo "$marker"
          } >> "$body_file"
          jq -n --rawfile body "$body_file" '{body: $body}' > "$payload_file"

          comment_id="$(
            gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
              | head -n1
          )"
          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$comment_id" --input "$payload_file" >/dev/null
          else
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" --input "$payload_file" >/dev/null
          fi

      - name: 🤖 Auto-merge Renovate PR without deploy diff
        if: >
          github.event_name == 'pull_request' &&
          steps.deploy-diff.outputs.has_diff == 'false' &&
          (github.event.pull_request.user.login == 'renovate[bot]' || startsWith(github.event.pull_request.head.ref, 'renovate/'))
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Query labels live: the pull_request event payload can race Renovate's label call.
          if gh pr view "$PR_URL" --json labels --jq '.labels[].name' | grep -qx 'risk/high'; then
            echo "risk/high label present (e.g. kairos/k3s: no manifest diff but boots the control plane) — skipping auto-merge"
            exit 0
          fi
          gh pr merge "$PR_URL" --auto --squash --delete-branch

      - name: 📦 Upload deploy-diff.md
        uses: actions/upload-artifact@v7
        with:
          name: deploy-diff
          path: deploy-diff.md
          if-no-files-found: error

      - name: 📦 Upload k8s manifests
        uses: actions/upload-artifact@v7
        with:
          name: k8s-manifests
          path: ./deploy
          if-no-files-found: error
          retention-days: 7

  # 2) Push manifests to deploy branch if push to main
  deploy:
    name: 🚀 Deploy k8s manifests
    needs: manifests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download k8s manifests
        uses: actions/download-artifact@v8
        with:
          name: k8s-manifests
          path: artifacts

      - name: 🔐 Create deploy app token
        id: deploy-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.K2_DEPLOY_APP_CLIENT_ID }}
          private-key: ${{ secrets.K2_DEPLOY_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: 🚢 Push to deploy branch
        uses: s0/git-publish-subdir-action@v2.6.0
        env:
          REPO: self
          BRANCH: deploy
          FOLDER: artifacts
          GITHUB_TOKEN: ${{ steps.deploy-token.outputs.token }}
          SKIP_EMPTY_COMMITS: true
