apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k2.wyvernzora.io/app: blocky
    k2.wyvernzora.io/component: blocky
  name: blocky-config
  namespace: blocky
data:
  blocky.yaml: |
    log:
      level: info
    upstreams:
      groups:
        10.42.0.0/16:
          - tcp+udp:k8s-gateway.blocky.svc.cluster.local:53
        10.43.0.0/16:
          - tcp+udp:k8s-gateway.blocky.svc.cluster.local:53
        10.1.0.0/16:
          - tcp+udp:k8s-gateway.blocky.svc.cluster.local:53
        10.2.0.0/16:
          - 1.1.1.1
          - 9.9.9.9
        10.8.0.0/16:
          - tcp+udp:k8s-gateway.blocky.svc.cluster.local:53
        10.10.0.0/16:
          - tcp+udp:k8s-gateway.blocky.svc.cluster.local:53
        default:
          - 1.1.1.1
          - 9.9.9.9
    conditional:
      fallbackUpstream: false
      mapping:
        wyvernzora.io: tcp+udp:k8s-gateway.blocky.svc.cluster.local:53
    blocking:
      whiteLists:
        default: []
      blackLists:
        default:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
      clientGroupsBlock:
        10.42.0.0/16:
          - default
        10.43.0.0/16:
          - default
        10.1.0.0/16:
          - default
        10.2.0.0/16:
          - default
        10.8.0.0/16:
          - default
        10.10.0.0/16:
          - default
        default:
          - default
    ports:
      dns: 53
      http: 4000
    prometheus:
      enable: true
      path: /metrics
immutable: false
---
