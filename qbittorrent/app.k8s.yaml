apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: qbittorrent
  name: qbittorrent
  namespace: qbittorrent
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: download-client
      app.kubernetes.io/name: qbittorrent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: download-client
        app.kubernetes.io/name: qbittorrent
        cdk8s.io/metadata.addr: qbittorrent-deployment-c81c333f
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - roxy
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - env:
            - name: PUID
              value: "3005"
            - name: PGID
              value: "2001"
            - name: UMASK
              value: "0007"
            - name: TZ
              value: America/Los_Angeles
            - name: WEBUI_PORTS
              value: 8080/tcp
          image: lscr.io/linuxserver/qbittorrent:4.6.7
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - wget
                - -qO
                - /dev/null
                - http://127.0.0.1:8080
            failureThreshold: 3
          name: qbittorrent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - wget
                - -qO
                - /dev/null
                - http://127.0.0.1:8080
            failureThreshold: 3
          resources:
            limits:
              cpu: 1000m
              ephemeral-storage: 8Gi
              memory: 4096Mi
            requests:
              cpu: 100m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /downloads/default
              name: vol-default
            - mountPath: /downloads/anime
              name: vol-anime
            - mountPath: /config
              name: pvc-qbittorrent-deployment-vol-appdata-claim-c8f9d988
              subPath: qbittorrent
        - env:
            - name: FLOOD_OPTION_AUTH
              value: none
            - name: FLOOD_OPTION_QBURL
              value: http://127.0.0.1:8080
            - name: FLOOD_OPTION_QBUSER
              value: dummy
            - name: FLOOD_OPTION_QBPASS
              value: dummy
            - name: FLOOD_OPTION_RUNDIR
              value: /config
            - name: FLOOD_OPTION_ALLOWEDPATH
              value: /downloads
          image: jesec/flood:4.14.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
          name: floodui
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
          resources:
            limits:
              cpu: 1500m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 2001
            runAsNonRoot: true
            runAsUser: 3005
          volumeMounts:
            - mountPath: /downloads/default
              name: vol-default
              readOnly: true
            - mountPath: /downloads/anime
              name: vol-anime
              readOnly: true
            - mountPath: /config
              name: pvc-qbittorrent-deployment-vol-appdata-claim-c8f9d988
              subPath: flood
        - args:
            - --transport=http
            - --addr=:8082
          env:
            - name: QBITTORRENT_URL
              value: http://127.0.0.1:8080
            - name: QBITTORRENT_SAVE_PATHS
              value: kura-inbox=/downloads/anime/downloads,other=/downloads/default
          image: ghcr.io/wyvernzora/qbit-bridge:dev
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8082
              scheme: HTTP
          name: qbit-bridge
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8082
              scheme: HTTP
          resources:
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      initContainers:
        - command:
            - sh
            - /init/appdata.sh
          image: busybox:1.37.0
          imagePullPolicy: Always
          name: init-appdata
          resources:
            limits:
              cpu: 1500m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /config
              name: pvc-qbittorrent-deployment-vol-appdata-claim-c8f9d988
            - mountPath: /init
              name: configmap-qbittorrent-deployment-qbittorrent-init-c8b071f3
        - command:
            - sh
            - /init/downloads.sh
          image: busybox:1.37.0
          imagePullPolicy: Always
          name: init-downloads
          resources:
            limits:
              cpu: 1500m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 2001
            runAsNonRoot: true
            runAsUser: 3005
          volumeMounts:
            - mountPath: /downloads/anime
              name: vol-anime
            - mountPath: /downloads/default
              name: vol-default
            - mountPath: /init
              name: configmap-qbittorrent-deployment-qbittorrent-init-c8b071f3
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: false
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: vol-default
          nfs:
            path: /mnt/data/downloads
            server: 10.10.8.1
        - name: vol-anime
          nfs:
            path: /mnt/data/media/anime
            server: 10.10.8.1
        - name: pvc-qbittorrent-deployment-vol-appdata-claim-c8f9d988
          persistentVolumeClaim:
            claimName: qbittorrent-deployment-vol-appdata-claim-c8f9d988
            readOnly: false
        - configMap:
            name: qbittorrent-deployment-qbittorrent-init-c8b071f3
          name: configmap-qbittorrent-deployment-qbittorrent-init-c8b071f3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: qbittorrent
  name: qbittorrent-deployment-vol-appdata-claim-c8f9d988
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
  storageClassName: longhorn
  volumeMode: Filesystem
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: qbittorrent
  name: qbittorrent-deployment-qbittorrent-init-c8b071f3
  namespace: qbittorrent
data:
  appdata.sh: |-
    #!/bin/sh
    set -eu
    umask 0007

    mkdir -p /config/qbittorrent/qBittorrent
    mkdir -p /config/flood

    if [ ! -f "/config/qbittorrent/qBittorrent/qBittorrent.conf" ]; then
      cp /init/qbittorrent.conf /config/qbittorrent/qBittorrent/qBittorrent.conf
    fi

    chown -R 3005:2001 /config
  downloads.sh: |-
    #!/bin/sh
    set -eu
    umask 0007

    mkdir -p /downloads/anime/downloads
    mkdir -p /downloads/default
  qbittorrent.conf: |-
    [BitTorrent]
    Session\AddExtensionToIncompleteFiles=true
    Session\DefaultSavePath=/downloads/anime/downloads
    Session\TempPathEnabled=false

    [Preferences]
    Downloads\SavePath=/downloads/anime/downloads
    Downloads\TempPathEnabled=false
    Downloads\UseIncompleteExtension=true
    WebUI\Address=0.0.0.0
    WebUI\HostHeaderValidation=false
    WebUI\LocalHostAuth=false
    WebUI\Port=8080
immutable: false
---
apiVersion: v1
kind: Service
metadata:
  labels:
    k2.wyvernzora.io/app: qbittorrent
    k2.wyvernzora.io/component: qbittorrent
  name: flood
  namespace: qbittorrent
spec:
  externalIPs: []
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app.kubernetes.io/component: download-client
    app.kubernetes.io/name: qbittorrent
  type: ClusterIP
