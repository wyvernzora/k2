apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: ciliumbgpclusterconfigs.cilium.io
spec:
  group: cilium.io
  names:
    categories:
      - cilium
      - ciliumbgp
    kind: CiliumBGPClusterConfig
    listKind: CiliumBGPClusterConfigList
    plural: ciliumbgpclusterconfigs
    shortNames:
      - cbgpcluster
    singular: ciliumbgpclusterconfig
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v2
      schema:
        openAPIV3Schema:
          description: CiliumBGPClusterConfig is the Schema for the CiliumBGPClusterConfig API
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: Spec defines the desired cluster configuration of the BGP control plane.
              properties:
                bgpInstances:
                  description: |-
                    A list of CiliumBGPInstance(s) which instructs
                    the BGP control plane how to instantiate virtual BGP routers.
                  items:
                    properties:
                      localASN:
                        description: |-
                          LocalASN is the ASN of this BGP instance.
                          Supports extended 32bit ASNs.
                        format: int64
                        maximum: 4294967295
                        minimum: 1
                        type: integer
                      localPort:
                        description: |-
                          LocalPort is the port on which the BGP daemon listens for incoming connections.

                          If not specified, BGP instance will not listen for incoming connections.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                      name:
                        description: |-
                          Name is the name of the BGP instance. It is a unique identifier for the BGP instance
                          within the cluster configuration.
                        maxLength: 255
                        minLength: 1
                        type: string
                      peers:
                        description: Peers is a list of neighboring BGP peers for this virtual router
                        items:
                          properties:
                            autoDiscovery:
                              description: AutoDiscovery is the configuration for auto-discovery of the peer address.
                              properties:
                                defaultGateway:
                                  description: defaultGateway is the configuration for auto-discovery of the default gateway.
                                  properties:
                                    addressFamily:
                                      description: addressFamily is the address family of the default gateway.
                                      enum:
                                        - ipv4
                                        - ipv6
                                      type: string
                                  required:
                                    - addressFamily
                                  type: object
                                mode:
                                  description: mode is the mode of the auto-discovery.
                                  enum:
                                    - DefaultGateway
                                  type: string
                              required:
                                - mode
                              type: object
                            name:
                              description: Name is the name of the BGP peer. It is a unique identifier for the peer within the BGP instance.
                              maxLength: 255
                              minLength: 1
                              type: string
                            peerASN:
                              default: 0
                              description: |-
                                PeerASN is the ASN of the peer BGP router.
                                Supports extended 32bit ASNs.

                                If peerASN is 0, the BGP OPEN message validation of ASN will be disabled and
                                ASN will be determined based on peer's OPEN message.
                              format: int64
                              maximum: 4294967295
                              minimum: 0
                              type: integer
                            peerAddress:
