apiVersion: ingress.pomerium.io/v1
kind: Pomerium
metadata:
  labels:
    k2.wyvernzora.io/app: pomerium
    k2.wyvernzora.io/component: global-config
  name: global
spec:
  authenticate:
    url: https://login.wyvernzora.io
  certificates:
    - pomerium/default-certificate
  codecType: http3
  cookie:
    expire: 168h
  identityProvider:
    provider: oidc
    scopes:
      - openid
      - email
      - profile
    secret: pomerium/pocket-id
    url: https://id.wyvernzora.io
  jwtClaimHeaders:
    X-Pomerium-Claim-Email: email
    X-Pomerium-Claim-Preferred-Username: preferred_username
  mcpAllowedClientIdDomains:
    - wyvernzora.io
    - "*.wyvernzora.io"
    - chatgpt.com
    - chat.openai.com
    - claude.ai
  runtimeFlags:
    mcp: true
  secrets: pomerium/bootstrap
  storage:
    postgres:
      secret: pomerium/pomerium-storage
