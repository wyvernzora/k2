apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: plex
  name: plex
  namespace: plex
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: media-server
      app.kubernetes.io/name: plex
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: media-server
        app.kubernetes.io/name: plex
        cdk8s.io/metadata.addr: plex-deployment-c8241fd2
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - roxy
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - env:
            - name: PLEX_UID
              value: "3001"
            - name: PLEX_GID
              value: "2001"
            - name: TZ
              value: America/Los_Angeles
            - name: VERSION
              value: docker
            - name: ADVERTISE_IP
              value: https://plex.wyvernzora.io
            - name: CHANGE_CONFIG_DIR_OWNERSHIP
              value: "false"
          image: plexinc/pms-docker:1.43.2.10687-563d026ea
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /identity
              port: 32400
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
          name: plex
          ports:
            - containerPort: 32400
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /identity
              port: 32400
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 4000m
              ephemeral-storage: 8Gi
              memory: 8192Mi
            requests:
              cpu: 250m
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /identity
              port: 32400
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /config
              name: pvc-plex-config
            - mountPath: /config/Library/Application Support/Plex Media Server/Plug-in Support/Databases
              name: pvc-plex-databases
            - mountPath: /anime/series
              name: vol-series
            - mountPath: /anime/features
              name: vol-features
            - mountPath: /transcode
              name: vol-transcode
        - env:
            - name: XDG_CONFIG_HOME
              value: /config
            - name: XDG_DATA_HOME
              value: /data
          image: caddy:2.11.4-alpine
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 6
            periodSeconds: 10
            tcpSocket:
              port: 8443
            timeoutSeconds: 5
          name: caddy
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
            - containerPort: 8443
              name: https
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 10
            tcpSocket:
              port: 8443
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 512Mi
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /etc/caddy/Caddyfile
              name: configmap-plex-deployment-caddy-config-c8c3fb47
              subPath: Caddyfile
            - mountPath: /tls
              name: secret-default-certificate
              readOnly: true
            - mountPath: /config
              name: caddy-config-state
            - mountPath: /data
              name: caddy-data
            - mountPath: /tmp
              name: caddy-tmp
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      initContainers:
        - command:
            - sh
            - -c
            - |-
              set -eu

              mkdir -p "/config/Library/Application Support/Plex Media Server/Plug-in Support"
              mkdir -p "/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases"
              touch "/config/.k2-plex-config-initialized"
          image: busybox:1.38.0
          imagePullPolicy: IfNotPresent
          name: init-plex-config
          resources:
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 2001
            runAsNonRoot: true
            runAsUser: 3001
          volumeMounts:
            - mountPath: /config
              name: pvc-plex-config
        - command:
            - sh
            - -c
            - |-
              set -eu

              mkdir -p "/databases"
              if [ ! -f "/databases/.k2-plex-permissions-3001-2001-initialized" ]; then
                chown -R 3001:2001 "/databases"
                touch "/databases/.k2-plex-permissions-3001-2001-initialized"
                chown 3001:2001 "/databases/.k2-plex-permissions-3001-2001-initialized"
              fi
          image: busybox:1.38.0
          imagePullPolicy: IfNotPresent
          name: init-plex-databases
          resources:
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - mountPath: /databases
              name: pvc-plex-databases
      restartPolicy: Always
      securityContext:
        runAsNonRoot: false
        supplementalGroups:
          - 2001
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: pvc-plex-config
          persistentVolumeClaim:
            claimName: plex-config
            readOnly: false
        - name: pvc-plex-databases
          persistentVolumeClaim:
            claimName: plex-databases
            readOnly: false
        - name: vol-series
          nfs:
            path: /mnt/data/media/anime/series
            readOnly: true
            server: 10.10.8.1
        - name: vol-features
          nfs:
            path: /mnt/data/media/anime/features
            readOnly: true
            server: 10.10.8.1
        - emptyDir:
            sizeLimit: 32768Mi
          name: vol-transcode
        - configMap:
            name: plex-deployment-caddy-config-c8c3fb47
          name: configmap-plex-deployment-caddy-config-c8c3fb47
        - name: secret-default-certificate
          secret:
            secretName: default-certificate
        - emptyDir:
            sizeLimit: 1024Mi
          name: caddy-config-state
        - emptyDir:
            sizeLimit: 1024Mi
          name: caddy-data
        - emptyDir:
            sizeLimit: 1024Mi
          name: caddy-tmp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: plex
  name: plex-config
  namespace: plex
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 256Gi
  storageClassName: nfs-csi
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: plex
  name: plex-databases
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: longhorn
  volumeMode: Filesystem
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: plex
  name: plex-deployment-caddy-config-c8c3fb47
  namespace: plex
data:
  Caddyfile: |-
    {
      auto_https off
    }

    :80 {
      redir https://{host}{uri} permanent
    }

    :8443 {
      tls /tls/tls.crt /tls/tls.key
      reverse_proxy 127.0.0.1:32400
    }
immutable: false
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: plex.wyvernzora.io
    lbipam.cilium.io/ips: 10.10.13.2
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: plex
  name: plex
  namespace: plex
spec:
  externalIPs: []
  externalTrafficPolicy: Cluster
  loadBalancerSourceRanges:
    - 10.1.0.0/16
    - 10.8.0.0/16
    - 10.10.0.0/16
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8443
  selector:
    app.kubernetes.io/component: media-server
    app.kubernetes.io/name: plex
  type: LoadBalancer
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: network-policy
  name: namespace-boundary
  namespace: plex
spec:
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: plex
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: plex
    - fromEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: plex
    k2.wyvernzora.io/component: network-policy
  name: plex-plex-network
specs:
  - egress:
      - toCIDR:
          - 10.10.8.1/32
        toPorts:
          - ports:
              - port: "2049"
                protocol: TCP
      - toEntities:
          - world
        toPorts:
          - ports:
              - port: "80"
                protocol: TCP
              - port: "443"
                protocol: TCP
    endpointSelector:
      matchLabels:
        app.kubernetes.io/component: media-server
        app.kubernetes.io/name: plex
        k8s:io.kubernetes.pod.namespace: plex
    ingress:
      - fromCIDR:
          - 10.1.0.0/16
        toPorts:
          - ports:
              - port: "80"
                protocol: TCP
      - fromCIDR:
          - 10.8.0.0/16
        toPorts:
          - ports:
              - port: "80"
                protocol: TCP
      - fromCIDR:
          - 10.10.0.0/16
        toPorts:
          - ports:
              - port: "80"
                protocol: TCP
      - fromCIDR:
          - 10.1.0.0/16
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      - fromCIDR:
          - 10.8.0.0/16
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      - fromCIDR:
          - 10.10.0.0/16
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      - fromEntities:
          - world
        toPorts:
          - ports:
              - port: "80"
                protocol: TCP
      - fromEntities:
          - world
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
              - port: "32400"
                protocol: TCP
      - fromEntities:
          - remote-node
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
              - port: "32400"
                protocol: TCP
    ingressDeny:
      - fromEndpoints:
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: plex
        toPorts:
          - ports:
              - port: "32400"
                protocol: TCP
