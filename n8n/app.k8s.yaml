apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: n8n
    k2.wyvernzora.io/component: network-policy
  name: namespace-boundary
  namespace: n8n
spec:
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: n8n
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: n8n
    - fromEntities:
        - kube-apiserver
