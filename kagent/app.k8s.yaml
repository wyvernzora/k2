    k2.wyvernzora.io/app: kagent
    k2.wyvernzora.io/component: network-policy
  name: kagent-agent-model-provider-egress
specs:
  - egress:
      - toFQDNs:
          - matchName: api.openai.com
          - matchName: api.anthropic.com
          - matchPattern: bedrock.*.amazonaws.com
          - matchPattern: bedrock-runtime.*.amazonaws.com
          - matchPattern: bedrock-agent.*.amazonaws.com
          - matchPattern: bedrock-agent-runtime.*.amazonaws.com
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
    endpointSelector:
      matchLabels:
        app.kubernetes.io/managed-by: kagent
        k8s:io.kubernetes.pod.namespace: kagent
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  labels:
    k2.wyvernzora.io/app: kagent
    k2.wyvernzora.io/component: network-policy
  name: kagent-kura-kagent-to-kura-mcp
specs:
  - description: kagent to kura
    egress:
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/component: library-manager
              app.kubernetes.io/name: kura
              k8s:io.kubernetes.pod.namespace: kura
        toPorts:
          - ports:
              - port: "8081"
                protocol: TCP
    endpointSelector:
      matchLabels:
        k8s:io.kubernetes.pod.namespace: kagent
  - description: kagent to kura
    endpointSelector:
      matchLabels:
        app.kubernetes.io/component: library-manager
        app.kubernetes.io/name: kura
        k8s:io.kubernetes.pod.namespace: kura
    ingress:
      - fromEndpoints:
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: kagent
        toPorts:
          - ports:
              - port: "8081"
                protocol: TCP
