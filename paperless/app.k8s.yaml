metadata:
  annotations:
    ingress.pomerium.io/pass_identity_headers: "true"
    ingress.pomerium.io/policy: |
      - allow:
          and:
            - authenticated_user: true
  labels:
    k2.wyvernzora.io/app: paperless
    k2.wyvernzora.io/component: paperless
  name: ingress
  namespace: paperless
