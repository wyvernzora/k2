spec:
  clusterIP: 10.43.62.173
  externalIPs: []
  ipFamilyPolicy: PreferDualStack
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8443
    - name: quic
      port: 443
      protocol: UDP
      targetPort: 443
    - name: http
