build:
  # Universal size cuts. Verified against the 26.04 dependency solver —
  # NOT cuttable despite looking like it (apt refuses, do not re-add):
  #   libc-gconv-modules-extra  (libc6 hard-Depends on 26.04)
  #   gnu-coreutils             (coreutils-from-uutils PreDepends it)
  #   shim-signed / grub-*-signed (wired into grub meta; purge cascades
  #                              into Essential packages)
  aptPurge:
    - neovim
    - neovim-runtime
    - libmagic-mgc
    - console-setup-linux
    - binutils
    - binutils-aarch64-linux-gnu
    - binutils-x86-64-linux-gnu
    - binutils-common
inspect:
  oci:
    files:
      - path: /usr/share/k2/image-build/metadata.yaml
        structuredTests:
          - op: test
            path: /diskStateSizeMiB
            value: 8192
          - op: test
            path: /upgradeSizeAllowanceMiB
            value: 1536
      - path: /system/oem/01-k2-rescue-deactivate.yaml
        structuredTests:
          - op: test
            path: /name
            value: K2 rescue user — deactivate on active boot
          - op: test
            path: /stages/boot/0/if
            value: '[ ! -f "/run/cos/recovery_mode" ]'
          - op: test
            path: /stages/boot/0/commands/0
            value: passwd -l k2-rescue
          - op: test
            path: /stages/boot/0/commands/1
            value: rm -f /etc/sudoers.d/99-k2-rescue
