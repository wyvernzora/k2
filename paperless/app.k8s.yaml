apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
  labels:
    k2.wyvernzora.io/app: paperless
    k2.wyvernzora.io/component: paperless
  name: setup
  namespace: paperless
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: setup
        app.kubernetes.io/name: paperless
        cdk8s.io/metadata.addr: paperless-setup-job-c8805f40
        k2.wyvernzora.io/scripted-workload-type: job
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: true
      containers:
        - command:
            - sh
            - -c
            - |-
              workload='job/setup'
              script='setup.py'
              log() { printf '%s %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$1"; }
              trap 'log "$workload interrupted by SIGTERM while running $script"; exit 143' TERM
              trap 'log "$workload interrupted by SIGINT while running $script"; exit 130' INT
              log "$workload started $script"
              "$@"
              status=$?
              if [ "$status" -eq 0 ]; then
                log "$workload finished $script successfully"
              else
                log "$workload finished $script with exit code $status"
              fi
              exit "$status"
            - scripted-workload
            - /scripts/setup.py
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PAPERLESS_INTERNAL_URL
              value: http://paperless
            - name: PAPERLESS_SETUP_USER
              value: paperless-setup
            - name: PAPERLESS_SETUP_EMAIL
              value: paperless-setup@kubernetes.local
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: adminPassword
                  name: paperless
            - name: PAPERLESS_LEGACY_ADMIN_USER
              value: wyvernzora@gmail.com
            - name: PAPERLESS_HUMAN_USER
              value: wyvernzora
            - name: PAPERLESS_HUMAN_EMAIL
              value: wyvernzora@gmail.com
            - name: PAPERLESS_MCP_USER
              value: paperless-mcp
            - name: PAPERLESS_MCP_GROUP
              value: paperless-mcp-rw
            - name: PAPERLESS_MCP_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: mcpPassword
                  name: paperless-provisioning
            - name: PAPERLESS_MCP_TOKEN_SECRET
              value: paperless-mcp-token
          image: ghcr.io/wyvernzora/k2-job-runner:v2
          imagePullPolicy: IfNotPresent
          name: script
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /scripts
              name: script
              readOnly: true
            - mountPath: /tmp
              name: tmp
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      restartPolicy: OnFailure
      securityContext:
        fsGroupChangePolicy: Always
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      serviceAccountName: setup
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 365
            name: setup-script
          name: script
        - emptyDir:
            sizeLimit: 16Mi
          name: tmp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k2.wyvernzora.io/app: paperless
    k2.wyvernzora.io/component: paperless
  name: paperless
  namespace: paperless
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: paperless
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: paperless
        cdk8s.io/metadata.addr: paperless-deployment-c8a1cb0b
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - roxy
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      automountServiceAccountToken: false
      containers:
        - env:
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: secretKey
                  name: paperless
            - name: PAPERLESS_ADMIN_USER
              value: paperless-setup
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: adminPassword
                  name: paperless
            - name: PAPERLESS_DBHOST
              valueFrom:
                secretKeyRef:
                  key: host
                  name: paperless-credentials
            - name: PAPERLESS_DBPORT
              valueFrom:
                secretKeyRef:
                  key: port
                  name: paperless-credentials
            - name: PAPERLESS_DBNAME
              valueFrom:
                secretKeyRef:
                  key: dbname
                  name: paperless-credentials
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: paperless-credentials
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  key: password
                  name: paperless-credentials
            - name: PAPERLESS_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: redisPassword
                  name: paperless
            - name: PAPERLESS_REDIS
              value: redis://:$(PAPERLESS_REDIS_PASSWORD)@paperless-redis:6379
            - name: PAPERLESS_URL
              value: https://paperless.wyvernzora.io
            - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
              value: https://paperless.wyvernzora.io
            - name: PAPERLESS_TIME_ZONE
              value: America/Los_Angeles
            - name: PAPERLESS_OCR_LANGUAGE
              value: eng
            - name: PAPERLESS_TASK_WORKERS
              value: "3"
            - name: PAPERLESS_THREADS_PER_WORKER
              value: "1"
            - name: PAPERLESS_CONSUMER_POLLING
              value: "10"
            - name: PAPERLESS_ENABLE_HTTP_REMOTE_USER
              value: "true"
            - name: PAPERLESS_ENABLE_HTTP_REMOTE_USER_API
              value: "true"
            - name: PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME
              value: HTTP_X_POMERIUM_CLAIM_PREFERRED_USERNAME
            - name: PAPERLESS_DISABLE_REGULAR_LOGIN
              value: "true"
            - name: PAPERLESS_ACCOUNT_ALLOW_SIGNUPS
              value: "false"
            - name: PAPERLESS_ENABLE_UPDATE_CHECK
              value: "false"
            - name: USERMAP_UID
              value: "3003"
            - name: USERMAP_GID
              value: "2002"
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
          name: paperless
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 4000m
              ephemeral-storage: 10Gi
              memory: 6144Mi
            requests:
              cpu: 500m
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /usr/src/paperless/data
              name: pvc-paperless-data
            - mountPath: /usr/src/paperless/consume
              name: vol-documents
              subPath: inbox
            - mountPath: /usr/src/paperless/export
              name: vol-documents
              subPath: exports
            - mountPath: /usr/src/paperless/media
              name: vol-documents
              subPath: vault
        - env:
            - name: PAPERLESS_URL
              value: http://127.0.0.1:8000
            - name: PAPERLESS_PUBLIC_URL
              value: https://paperless.wyvernzora.io
            - name: PAPERLESS_API_KEY
              valueFrom:
                secretKeyRef:
                  key: apiKey
                  name: paperless-mcp-token
            - name: PAPERLESS_API_VERSION
              value: "9"
          image: ghcr.io/baruchiro/paperless-mcp:latest
          imagePullPolicy: IfNotPresent
          name: paperless-mcp
          ports:
            - containerPort: 3000
              name: mcp
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 512Mi
            requests:
              cpu: 25m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostNetwork: false
      initContainers:
        - args:
            - |-
              set -eu
              umask 0007

              mkdir -p /paperless-documents/inbox
              mkdir -p /paperless-documents/exports
              mkdir -p /paperless-documents/vault
              chmod 2770 /paperless-documents/inbox
              chmod 2770 /paperless-documents/exports
              chmod 2770 /paperless-documents/vault
          command:
            - sh
            - -c
          image: busybox:1.37.0
          imagePullPolicy: Always
          name: init-documents
          resources:
            limits:
              cpu: 1500m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 2002
            runAsNonRoot: true
            runAsUser: 3003
          volumeMounts:
            - mountPath: /paperless-documents
              name: vol-documents
      restartPolicy: Always
      securityContext:
        fsGroup: 2002
        fsGroupChangePolicy: Always
        runAsNonRoot: false
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: pvc-paperless-data
          persistentVolumeClaim:
            claimName: paperless-data
            readOnly: false
        - name: vol-documents
          nfs:
            path: /mnt/data/documents/archive
            server: 10.10.8.1
